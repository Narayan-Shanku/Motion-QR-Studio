<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Motion QR — Viewer</title>
  <meta name="theme-color" content="#0d0f14" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      /* 🌙 NYC Night - Midnight Editorial */
      --bg:#0B0B14; --ink:#F8F8FC; --muted:#9CA3AF;
      --accent:#22D3EE; --accent-2:#F472B6; --accent-3:#34D399; --danger:#F87171;
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,255,255,.14);
      --bg-elev:rgba(255,255,255,.04);
      --halo-1:rgba(34,211,238,.45);
      --halo-2:rgba(244,114,182,.4);
      --radius:18px;
      --sans:"Space Grotesk", system-ui, sans-serif;
      --mono:"JetBrains Mono", "SF Mono", monospace;
      --grad-1:rgba(34,211,238,.14);
      --grad-2:rgba(244,114,182,.10);
    }
    [data-theme="light"]{
      /* ☀️ California Beach - Coastal Editorial */
      --bg:#FAF6EE; --ink:#1F1A15; --muted:#7A6F62;
      --accent:#0F766E; --accent-2:#E07856; --accent-3:#D4A574; --danger:#B91C1C;
      --line:rgba(31,26,21,.08);
      --line-strong:rgba(31,26,21,.14);
      --bg-elev:rgba(31,26,21,.04);
      --halo-1:rgba(15,118,110,.30);
      --halo-2:rgba(224,120,86,.25);
      --grad-1:rgba(15,118,110,.08);
      --grad-2:rgba(224,120,86,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; padding:28px 16px 50px; color:var(--ink); font-family:var(--sans);
      background:
        radial-gradient(900px 500px at 10% 0%, var(--grad-1), transparent 60%),
        radial-gradient(700px 500px at 90% 10%, var(--grad-2), transparent 55%),
        var(--bg);
      transition: background 0.4s ease, color 0.3s ease;
    }
    .wrap{ max-width:760px; margin:0 auto; }
    h1{ font-size:24px; margin:0 0 6px; }
    .subtitle{ color:var(--muted); font-size:13px; margin-bottom:20px; }

    .card{
      background:linear-gradient(180deg, var(--bg-elev), transparent);
      border:1px solid var(--line); border-radius:var(--radius);
      box-shadow:0 20px 60px rgba(0,0,0,.2);
      padding:20px; position:relative; overflow:hidden;
    }
    .card::after{
      content:""; position:absolute; inset:-2px;
      background:conic-gradient(from 0deg, var(--halo-1), var(--halo-2), var(--halo-1));
      filter:blur(50px); opacity:.3; animation:swirl 22s linear infinite; z-index:-1;
    }
    @keyframes swirl{ to{ transform:rotate(360deg); } }

    .pill{
      font-family:var(--mono); font-size:12px; padding:5px 10px; border-radius:999px;
      background:var(--bg-elev); border:1px solid var(--line-strong);
      display:inline-flex; align-items:center; gap:6px;
    }
    .pill[data-tone="ok"]{ border-color:var(--accent); color:var(--accent); background:var(--halo-1); }
    .pill[data-tone="warn"]{ border-color:var(--accent-2); color:var(--accent-2); background:var(--halo-2); }
    .pill[data-tone="err"]{ border-color:var(--danger); color:var(--danger); background:transparent; }

    .header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }

    .content-text{
      white-space:pre-wrap; word-break:break-word; font-family:var(--mono); font-size:14px; line-height:1.5;
      background:var(--bg-elev); border:1px solid var(--line); border-radius:14px; padding:16px; max-height:60vh; overflow:auto;
      color:var(--ink);
    }
    .content-image{ display:flex; justify-content:center; align-items:center; padding:8px; background:var(--bg-elev); border-radius:14px; border:1px solid var(--line); }
    .content-image img{ max-width:100%; max-height:60vh; border-radius:8px; }
    .content-file{
      display:flex; gap:14px; align-items:center; padding:16px;
      background:var(--bg-elev); border:1px solid var(--line); border-radius:14px;
    }
    .file-icon{ width:60px; height:60px; border-radius:12px; display:grid; place-items:center; background:linear-gradient(135deg, var(--halo-1), var(--halo-2)); border:1px solid var(--accent); font-family:var(--mono); font-size:11px; color:var(--accent); padding:4px; text-align:center; word-break:break-all; }
    .file-info{ flex:1; min-width:0; }
    .file-name{ font-size:15px; font-weight:600; margin-bottom:4px; word-break:break-all; color:var(--ink); }
    .file-meta{ color:var(--muted); font-family:var(--mono); font-size:12px; }

    button, .btn{
      appearance:none; border:1px solid var(--line-strong); cursor:pointer;
      color:var(--ink); background:var(--bg-elev);
      padding:10px 16px; border-radius:12px; font-family:var(--sans); font-weight:600; font-size:13px;
      transition:transform .08s ease, background .15s ease, box-shadow .2s ease;
      display:inline-flex; gap:8px; align-items:center; text-decoration:none;
    }
    button:hover, .btn:hover{ background:var(--halo-1); border-color:var(--accent); }
    .btn-primary{
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color:var(--accent); color:var(--bg);
      font-weight:700;
    }
    .btn-primary:hover{ box-shadow:0 12px 28px var(--halo-1); transform:translateY(-1px); }

    .toolbar{ display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }

    .empty-state{ text-align:center; padding:40px 20px; }
    .empty-state .glyph{ font-size:48px; margin-bottom:12px; opacity:.4; }
    .empty-state h2{ margin:0 0 8px; }
    .empty-state p{ color:var(--muted); font-size:14px; margin:0; }

    .loader{
      display:inline-block; width:18px; height:18px; border:2px solid var(--bg-elev);
      border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    footer{ margin-top:24px; text-align:center; color:var(--muted); font-size:12px; }
    footer a{ color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Shared via Motion QR</h1>
    <div class="subtitle">Ephemeral content. Auto-deletes when expiry hits.</div>

    <div class="card">
      <div class="header">
        <span class="pill" id="kind-pill"><span class="loader"></span> Loading…</span>
        <span class="pill" id="countdown-pill" hidden>—</span>
      </div>
      <div id="content"></div>
      <div class="toolbar" id="toolbar" hidden></div>
    </div>

    <footer>
      <p>Want to send something back? <a href="./index.html">Open Motion QR Studio →</a></p>
    </footer>
  </div>

  <script src="./config.js"></script>
  <script>
  // Initialize theme from localStorage
  (function() {
    const savedTheme = localStorage.getItem('motion-qr-theme') || 'dark';
    if (savedTheme === 'light') document.documentElement.dataset.theme = 'light';
  })();

  (async () => {
    const cfg = window.MOTION_QR_CONFIG || {};
    const API = (cfg.apiBase || "").replace(/\/$/, "");
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const contentEl = document.getElementById("content");
    const kindPill = document.getElementById("kind-pill");
    const countdownPill = document.getElementById("countdown-pill");
    const toolbar = document.getElementById("toolbar");

    function showError(title, body) {
      kindPill.textContent = "error";
      kindPill.dataset.tone = "err";
      contentEl.innerHTML = `
        <div class="empty-state">
          <div class="glyph">⌧</div>
          <h2>${escape(title)}</h2>
          <p>${escape(body)}</p>
        </div>`;
    }
    function escape(s) {
      return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }
    function fmtBytes(b) {
      if (b < 1024) return b + " B";
      if (b < 1048576) return (b/1024).toFixed(1) + " KB";
      if (b < 1073741824) return (b/1048576).toFixed(1) + " MB";
      return (b/1073741824).toFixed(2) + " GB";
    }
    function fmtDuration(s) {
      if (s < 60) return s + "s";
      if (s < 3600) return Math.floor(s/60) + "m " + (s%60) + "s";
      if (s < 86400) return Math.floor(s/3600) + "h " + Math.floor((s%3600)/60) + "m";
      return Math.floor(s/86400) + "d " + Math.floor((s%86400)/3600) + "h";
    }
    function startCountdown(expiresAt) {
      countdownPill.hidden = false;
      const tick = () => {
        const remaining = expiresAt - Math.floor(Date.now()/1000);
        if (remaining <= 0) {
          countdownPill.textContent = "EXPIRED";
          countdownPill.dataset.tone = "err";
          // The content is technically still loaded, but tell the user it's gone server-side
          setTimeout(() => location.reload(), 1500);
          return;
        }
        countdownPill.textContent = "expires in " + fmtDuration(remaining);
        countdownPill.dataset.tone = remaining < 300 ? "warn" : "ok";
      };
      tick();
      setInterval(tick, 1000);
    }

    if (!id) { showError("No content ID", "This link is missing an id parameter."); return; }
    if (!API || API.includes("REPLACE_WITH")) {
      showError("Not configured", "The viewer's API URL is not set. Edit config.js after deploying the backend.");
      return;
    }

    let res, data;
    try {
      res = await fetch(API + "/uploads/" + id);
    } catch {
      showError("Network error", "Couldn't reach the API.");
      return;
    }

    if (res.status === 404) { showError("Not found", "This link is invalid, or the content has already been deleted."); return; }
    if (res.status === 410) { showError("Expired", "This content has expired and been removed."); return; }
    if (!res.ok) { showError("Error " + res.status, "Something went wrong."); return; }

    try { data = await res.json(); } catch { showError("Bad response", "The server returned invalid data."); return; }

    kindPill.textContent = data.kind;
    kindPill.dataset.tone = "ok";
    if (data.expiresAt) startCountdown(data.expiresAt);

    if (data.kind === "text") {
      const isUrl = /^https?:\/\//i.test(data.text.trim());
      contentEl.innerHTML = `<div class="content-text">${escape(data.text)}</div>`;
      toolbar.hidden = false;
      toolbar.innerHTML = `
        <button id="copy">Copy text</button>
        ${isUrl ? `<a class="btn btn-primary" href="${escape(data.text.trim())}" target="_blank" rel="noopener">Open link →</a>` : ""}
      `;
      document.getElementById("copy").addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(data.text); document.getElementById("copy").textContent = "Copied!"; }
        catch {}
      });
    }
    else if (data.kind === "image") {
      contentEl.innerHTML = `<div class="content-image"><img src="${escape(data.downloadUrl)}" alt="${escape(data.fileName||"image")}"></div>`;
      toolbar.hidden = false;
      toolbar.innerHTML = `
        <a class="btn btn-primary" href="${escape(data.downloadUrl)}" download="${escape(data.fileName||"image")}">Download</a>
        <span class="pill">${escape(data.fileName||"image")} · ${fmtBytes(data.sizeBytes||0)}</span>
      `;
    }
    else if (data.kind === "file") {
      const ext = (data.fileName || "").split(".").pop().toUpperCase().slice(0,5) || "FILE";
      contentEl.innerHTML = `
        <div class="content-file">
          <div class="file-icon">${escape(ext)}</div>
          <div class="file-info">
            <div class="file-name">${escape(data.fileName || "file")}</div>
            <div class="file-meta">${escape(data.contentType||"")} · ${fmtBytes(data.sizeBytes||0)}</div>
          </div>
        </div>`;
      toolbar.hidden = false;
      toolbar.innerHTML = `<a class="btn btn-primary" href="${escape(data.downloadUrl)}" download="${escape(data.fileName||"file")}">Download</a>`;
    }
    else {
      showError("Unknown kind", "The content type is not recognized.");
    }
  })();
  </script>
</body>
</html>
